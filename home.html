<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jus IA</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    /* ── Farol DS tokens ──────────────────────────────────── */
    :root {
      --background:        #FFFFFF;
      --foreground:        #0F172A;
      --primary:           #007A5F;
      --primary-foreground:#FFFFFF;
      --primary-3:         #00664F;
      --muted:             #F1F5F9;
      --muted-foreground:  #5C6F8A;
      --border:            #E2E8F0;
      --card-border:       #CCD5E1;

      --shadow-1: 0px 2px 4px 0px rgba(25,52,102,0.04);
      --shadow-2: 0px 2px 8px 0px rgba(25,52,102,0.08);
      --shadow-3: 0px 4px 24px 0px rgba(25,52,102,0.08);

      --ease-productive: cubic-bezier(0,0,0.3,1);
      --radius-sm: 8px;
      --radius-md: 16px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: var(--background);
      color: var(--foreground);
      font-family: 'Inter', sans-serif;
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
    }

    /* ── LAYOUT ────────────────────────────────────────────── */
    .app {
      display: flex;
      height: 100%;
    }

    /* ── SIDEBAR ───────────────────────────────────────────── */
    .sidebar {
      width: 56px;
      flex-shrink: 0;
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 16px 0;
    }

    .sidebar-top {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }

    .sidebar-bottom {
      margin-top: auto;
    }

    .sidebar-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 36px;
      height: 36px;
      border-radius: var(--radius-sm);
      border: none;
      background: transparent;
      color: var(--muted-foreground);
      cursor: pointer;
      transition: background 160ms var(--ease-productive),
                  color 160ms var(--ease-productive);
    }

    .sidebar-btn:hover {
      background: var(--muted);
      color: var(--foreground);
    }

    .sidebar-btn svg { width: 20px; height: 20px; }

    /* ── MAIN ──────────────────────────────────────────────── */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
      overflow-y: auto;
    }

    .content {
      width: 100%;
      max-width: 680px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }

    /* ── GREETING ──────────────────────────────────────────── */
    .greeting {
      font-size: clamp(28px, 3vw, 40px);
      font-weight: 700;
      letter-spacing: -0.5px;
      color: var(--foreground);
      margin-bottom: 32px;
      opacity: 0;
      animation: fadeUp 240ms 80ms cubic-bezier(0.4,0.12,0.4,1) forwards;
    }

    /* ── INPUT CARD (idêntico ao index.html) ───────────────── */
    .input-card {
      width: 100%;
      background: var(--background);
      border: 1px solid var(--card-border);
      border-radius: var(--radius-md);
      box-shadow: var(--shadow-2);
      transition: box-shadow 160ms var(--ease-productive),
                  border-color 160ms var(--ease-productive);
      opacity: 0;
      animation: fadeUp 240ms 160ms cubic-bezier(0.4,0.12,0.4,1) forwards;
    }

    .input-card:focus-within { box-shadow: var(--shadow-3); }

    .input-label-row {
      position: relative;
      padding: 16px 16px 8px;
    }

    .static-placeholder {
      position: absolute;
      top: 16px;
      left: 16px;
      right: 16px;
      pointer-events: none;
      color: var(--muted-foreground);
      font-size: 14px;
      line-height: 1.5;
      white-space: nowrap;
      overflow: hidden;
    }

    .main-input {
      width: 100%;
      border: none;
      outline: none;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      line-height: 1.5;
      color: var(--foreground);
      background: transparent;
      resize: none;
      min-height: 22px;
      caret-color: var(--primary);
    }

    .main-input::placeholder { color: transparent; }

    .input-actions-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px 16px;
      gap: 8px;
    }

    .input-left-actions,
    .input-right-actions {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .icon-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 36px;
      height: 36px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--card-border);
      background: var(--background);
      box-shadow: var(--shadow-1);
      color: var(--foreground);
      cursor: pointer;
      flex-shrink: 0;
      transition: background 160ms var(--ease-productive);
    }

    .icon-btn:hover { background: var(--muted); }

    .icon-btn svg { width: 20px; height: 20px; }

    .chip-fundamentada {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      height: 36px;
      padding: 0 12px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--card-border);
      background: var(--background);
      box-shadow: var(--shadow-1);
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 600;
      color: #2B3950;
      cursor: pointer;
      white-space: nowrap;
      flex-shrink: 0;
      transition: background 160ms var(--ease-productive);
    }

    .chip-fundamentada:hover { background: var(--muted); }

    .chip-fundamentada svg { width: 18px; height: 18px; flex-shrink: 0; }

    .btn-send {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 36px;
      height: 36px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--muted);
      background: var(--muted);
      color: var(--muted-foreground);
      cursor: not-allowed;
      transition: background 160ms var(--ease-productive),
                  border-color 160ms var(--ease-productive),
                  color 160ms var(--ease-productive),
                  transform 80ms var(--ease-productive);
      flex-shrink: 0;
    }

    .btn-send svg { width: 18px; height: 18px; }

    .btn-send.active {
      background: var(--primary);
      border-color: var(--primary);
      color: var(--primary-foreground);
      cursor: pointer;
    }

    .btn-send.active:hover { background: var(--primary-3); border-color: var(--primary-3); }
    .btn-send.active:active { transform: scale(0.92); }

    /* ── SUGESTÕES ─────────────────────────────────────────── */
    .suggestions {
      width: 100%;
      margin-top: 8px;
      opacity: 0;
      animation: fadeUp 240ms 240ms cubic-bezier(0.4,0.12,0.4,1) forwards;
    }

    .suggestion-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 0;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      color: var(--muted-foreground);
      font-size: 14px;
      font-weight: 500;
      transition: color 160ms var(--ease-productive);
      background: none;
      border-left: none;
      border-right: none;
      border-top: none;
      border-radius: 0;
      width: 100%;
      text-align: left;
      font-family: 'Inter', sans-serif;
    }

    .suggestion-item:hover { color: var(--foreground); }

    .suggestion-item svg {
      width: 18px;
      height: 18px;
      flex-shrink: 0;
      color: var(--muted-foreground);
    }

    /* Toggle "Mostrar mais sugestões" */
    .suggestions-toggle {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 14px 0;
      cursor: pointer;
      color: var(--muted-foreground);
      font-size: 14px;
      font-weight: 500;
      background: none;
      border: none;
      font-family: 'Inter', sans-serif;
      width: 100%;
      text-align: left;
      transition: color 160ms var(--ease-productive);
    }

    .suggestions-toggle:hover { color: var(--foreground); }

    .suggestions-toggle svg {
      width: 16px;
      height: 16px;
      flex-shrink: 0;
      transition: transform 240ms var(--ease-productive);
    }

    .suggestions-extra {
      overflow: hidden;
      max-height: 0;
      transition: max-height 300ms var(--ease-productive);
    }

    /* ── ANIMAÇÃO ──────────────────────────────────────────── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

<div class="app">

  <!-- ── SIDEBAR ─────────────────────────────────────────── -->
  <aside class="sidebar" aria-label="Navegação lateral">
    <div class="sidebar-top">
      <!-- Sidebar toggle -->
      <button class="sidebar-btn" aria-label="Alternar barra lateral">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <rect width="18" height="18" x="3" y="3" rx="2"/><path d="M9 3v18"/>
        </svg>
      </button>
      <!-- Compose -->
      <button class="sidebar-btn" aria-label="Nova conversa">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/>
        </svg>
      </button>
      <!-- Search -->
      <button class="sidebar-btn" aria-label="Buscar">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
        </svg>
      </button>
    </div>

    <div class="sidebar-bottom">
      <!-- Profile -->
      <button class="sidebar-btn" aria-label="Perfil">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
        </svg>
      </button>
    </div>
  </aside>

  <!-- ── MAIN ────────────────────────────────────────────── -->
  <main class="main">
    <div class="content">

      <!-- Greeting -->
      <h1 class="greeting" id="greeting"></h1>

      <!-- Input Card -->
      <form class="input-card" id="searchForm" autocomplete="off" novalidate>
        <div class="input-label-row">
          <span class="static-placeholder" id="staticPlaceholder">Insira documentos jurídicos, faça perguntas sobre casos, ou continue de onde parou...</span>
          <input
            class="main-input"
            id="mainInput"
            type="text"
            aria-label="Faça uma pergunta ao Jus IA"
            spellcheck="false"
          />
        </div>

        <div class="input-actions-row">
          <div class="input-left-actions">
            <button type="button" class="icon-btn" aria-label="Adicionar arquivo">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M12 5v14M5 12h14"/>
              </svg>
            </button>
            <button type="button" class="chip-fundamentada" aria-label="Pesquisa fundamentada">
              <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <circle cx="8.5" cy="8.5" r="5"/><path d="m14 14 2.5 2.5"/><path d="M8.5 6v5M6 8.5h5"/>
              </svg>
              Pesquisa fundamentada
            </button>
          </div>

          <div class="input-right-actions">
            <button type="button" class="icon-btn" aria-label="Entrada por voz">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M12 2a3 3 0 0 1 3 3v7a3 3 0 0 1-6 0V5a3 3 0 0 1 3-3z"/>
                <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
                <line x1="12" x2="12" y1="19" y2="22"/>
              </svg>
            </button>
            <button type="submit" class="btn-send" id="btnSend" disabled aria-label="Enviar mensagem">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M12 19V5M5 12l7-7 7 7"/>
              </svg>
            </button>
          </div>
        </div>
      </form>

      <!-- Sugestões -->
      <div class="suggestions" id="suggestions">

        <!-- 3 visíveis -->
        <button class="suggestion-item" data-idx="0">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
          </svg>
          Analise os autos e mapeie teses de defesa no TJCE
        </button>

        <button class="suggestion-item" data-idx="1">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
          </svg>
          Me ajude a redigir um habeas corpus ou contestação
        </button>

        <button class="suggestion-item" data-idx="2">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
          </svg>
          Encontre precedentes do TJCE para esse caso
        </button>

        <!-- Toggle -->
        <button class="suggestions-toggle" id="toggleMore">
          <svg id="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="m6 9 6 6 6-6"/>
          </svg>
        </button>

        <!-- 3 ocultas -->
        <div class="suggestions-extra" id="extraList">
          <button class="suggestion-item" data-idx="3">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
            </svg>
            Analise a viabilidade de impetrar habeas corpus
          </button>

          <button class="suggestion-item" data-idx="4">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
            </svg>
            Resuma este documento e aponte riscos para a defesa
          </button>

          <button class="suggestion-item" data-idx="5" style="border-bottom: none;">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
            </svg>
            Elabore estratégia de defesa criminal para o caso
          </button>
        </div>

      </div>
    </div>
  </main>
</div>

<script>
  (() => {
    const STORAGE_KEY = 'jusIA_landingInput';

    // ── Greeting ─────────────────────────────────────────────
    const hour = new Date().getHours();
    const salutation = hour < 12 ? 'Bom dia' : hour < 18 ? 'Boa tarde' : 'Boa noite';
    const name = localStorage.getItem('jusIA_userName') || 'Jheyssa';
    document.getElementById('greeting').textContent = salutation + ', ' + name;

    // ── Input ─────────────────────────────────────────────────
    const input       = document.getElementById('mainInput');
    const placeholder = document.getElementById('staticPlaceholder');
    const btnSend     = document.getElementById('btnSend');
    const form        = document.getElementById('searchForm');

    function syncButtons() {
      const has = input.value.trim().length > 0;
      btnSend.disabled = !has;
      btnSend.classList.toggle('active', has);
      placeholder.style.display = has ? 'none' : '';
    }

    input.addEventListener('input', () => {
      localStorage.setItem(STORAGE_KEY, input.value);
      syncButtons();
    });

    form.addEventListener('submit', e => { e.preventDefault(); });

    // ── Prompts completos ─────────────────────────────────────
    const PROMPTS = [
      'Analise os autos desse processo e mapeie as principais teses de defesa aplicáveis, com foco na jurisprudência criminal e cível do TJCE e dos tribunais superiores.',
      'Me ajude a construir uma peça jurídica. Preciso de [habeas corpus / contestação / memoriais] referente ao seguinte caso: [descreva os fatos e a acusação].',
      'Busque precedentes do TJCE e dos tribunais superiores aplicáveis ao seguinte caso: [descreva os fatos, a acusação e as teses que pretendo sustentar].',
      'Analise a viabilidade de impetrar habeas corpus em favor do meu cliente. Situação: [descreva a prisão ou constrangimento ilegal, com data, autoridade coatora e fundamentos].',
      'Resuma os pontos principais deste documento jurídico e destaque os aspectos mais relevantes para a defesa, incluindo nulidades, prazos e riscos processuais.',
      'Elabore uma estratégia de defesa para o seguinte caso criminal: [descreva os fatos, a acusação, as provas disponíveis e o histórico processual]. Considere teses doutrinárias e jurisprudenciais aplicáveis.',
    ];

    document.getElementById('suggestions').addEventListener('click', e => {
      const btn = e.target.closest('[data-idx]');
      if (!btn) return;
      const prompt = PROMPTS[+btn.dataset.idx];
      input.value = prompt;
      localStorage.setItem(STORAGE_KEY, prompt);
      syncButtons();
      input.focus();
    });

    // ── Expandir sugestões ────────────────────────────────────
    const toggleBtn = document.getElementById('toggleMore');
    const extraList = document.getElementById('extraList');
    const chevron   = document.getElementById('chevron');
    let expanded    = false;

    const toggleLabel = document.createTextNode('Mostrar mais sugestões');
    toggleBtn.appendChild(toggleLabel);

    toggleBtn.addEventListener('click', () => {
      expanded = !expanded;
      extraList.style.maxHeight = expanded ? extraList.scrollHeight + 'px' : '0';
      chevron.style.transform   = expanded ? 'rotate(180deg)' : '';
      toggleLabel.textContent   = expanded ? 'Mostrar menos' : 'Mostrar mais sugestões';
    });

    // ── Init ──────────────────────────────────────────────────
    const saved = localStorage.getItem(STORAGE_KEY) || '';
    if (saved) { input.value = saved; }
    syncButtons();
  })();
</script>
</body>
</html>
