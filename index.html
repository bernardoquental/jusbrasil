<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jus IA - Toda IA responde. O Jus IA entende o Direito.</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    /* ── Farol DS tokens ──────────────────────────────────── */
    :root {
      --background:        #FFFFFF;
      --foreground:        #0F172A;
      --primary:           #007A5F;
      --primary-foreground:#FFFFFF;
      --primary-1:         #E6F4F0;
      --primary-3:         #00664F;
      --muted:             #F1F5F9;
      --muted-foreground:  #5C6F8A;
      --border:            #E2E8F0;
      --card-border:       #CCD5E1;
      --ring:              #007A5F;

      --shadow-1: 0px 2px 4px 0px rgba(25,52,102,0.04);
      --shadow-2: 0px 2px 8px 0px rgba(25,52,102,0.08);
      --shadow-3: 0px 4px 24px 0px rgba(25,52,102,0.08);

      --ease-productive: cubic-bezier(0,0,0.3,1);

      --radius-xs: 6px;
      --radius-sm: 8px;
      --radius-md: 16px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: var(--background);
      color: var(--foreground);
      font-family: 'Inter', sans-serif;
      font-size: 16px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    /* ── TOPBAR ──────────────────────────────────────────── */
    .topbar {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 50;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 40px;
      background: rgba(255,255,255,0.95);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid var(--border);
    }

    /* Logo Jus IA */
    .topbar-logo {
      display: flex;
      align-items: center;
      gap: 8px;
      text-decoration: none;
      color: var(--foreground);
      font-size: 15px;
      font-weight: 700;
      letter-spacing: -0.2px;
      flex-shrink: 0;
    }

    .topbar-nav {
      display: flex;
      align-items: center;
      gap: 32px;
      list-style: none;
    }

    .topbar-nav a {
      font-size: 14px;
      font-weight: 500;
      color: var(--muted-foreground);
      text-decoration: none;
      transition: color 160ms var(--ease-productive);
    }

    .topbar-nav a:hover { color: var(--foreground); }

    .topbar-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }

    /* Farol Button - secondary (borda, texto verde) */
    .btn-secondary {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      height: 36px;
      padding: 0 16px;
      border-radius: var(--radius-sm);
      border: 1.5px solid var(--border);
      background: transparent;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 600;
      color: var(--foreground);
      cursor: pointer;
      transition: border-color 160ms var(--ease-productive),
                  background 160ms var(--ease-productive);
      text-decoration: none;
    }

    .btn-secondary:hover {
      border-color: var(--card-border);
      background: var(--muted);
    }

    /* Farol Button - primary (fundo verde, texto branco) */
    .btn-primary {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      height: 36px;
      padding: 0 16px;
      border-radius: var(--radius-sm);
      border: none;
      background: var(--primary);
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 600;
      color: var(--primary-foreground);
      cursor: pointer;
      transition: background 160ms var(--ease-productive);
      text-decoration: none;
    }

    .btn-primary:hover { background: var(--primary-3); }

    /* ── HERO ─────────────────────────────────────────────── */
    .hero {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 96px 24px 80px;
      text-align: center;
    }

    .hero-headline {
      font-size: clamp(28px, 4vw, 48px);
      font-weight: 700;
      line-height: 1.2;
      letter-spacing: -0.4px;
      color: var(--foreground);
      max-width: 680px;
      margin-bottom: 16px;
      opacity: 0;
      animation: fadeUp 240ms 80ms cubic-bezier(0.4,0.12,0.4,1) forwards;
    }

    .hero-subtitle {
      font-size: 17px;
      line-height: 1.6;
      color: var(--muted-foreground);
      max-width: 440px;
      margin-bottom: 48px;
      opacity: 0;
      animation: fadeUp 240ms 160ms cubic-bezier(0.4,0.12,0.4,1) forwards;
    }

    /* ── INPUT CARD ──────────────────────────────────────── */
    .input-card {
      width: 100%;
      max-width: 680px;
      background: var(--background);
      border: 1px solid var(--card-border);
      border-radius: var(--radius-md);
      box-shadow: var(--shadow-2);
      transition: box-shadow 160ms var(--ease-productive),
                  border-color 160ms var(--ease-productive);
      opacity: 0;
      animation: fadeUp 240ms 240ms cubic-bezier(0.4,0.12,0.4,1) forwards;
    }

    .input-card:focus-within {
      box-shadow: var(--shadow-3);
    }

    /* Linha 1: area de texto */
    .input-label-row {
      position: relative;
      padding: 16px 16px 8px;
    }

    .tw-placeholder {
      position: absolute;
      top: 16px;
      left: 16px;
      right: 16px;
      pointer-events: none;
      color: var(--muted-foreground);
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      line-height: 1.5;
      white-space: nowrap;
      overflow: hidden;
      text-align: left;
    }

    .main-input {
      width: 100%;
      border: none;
      outline: none;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      line-height: 1.5;
      color: var(--foreground);
      background: transparent;
      resize: none;
      min-height: 22px;
      caret-color: var(--primary);
      text-align: left;
    }

    .main-input::placeholder { color: transparent; }

    /* Linha 2: acoes */
    .input-actions-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px 16px;
      gap: 8px;
    }

    .input-left-actions,
    .input-right-actions {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* Farol IconButton — borda + sombra-1 */
    .icon-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 36px;
      height: 36px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--card-border);
      background: var(--background);
      box-shadow: var(--shadow-1);
      color: var(--foreground);
      cursor: not-allowed;
      opacity: 0.4;
      transition: opacity 160ms var(--ease-productive),
                  background 160ms var(--ease-productive);
      flex-shrink: 0;
    }

    .icon-btn svg { width: 20px; height: 20px; }

    /* Chip "Pesquisa fundamentada" — Farol ChipClickable / button tertiary */
    .chip-fundamentada {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      height: 36px;
      padding: 0 12px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--card-border);
      background: var(--background);
      box-shadow: var(--shadow-1);
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 600;
      color: #2B3950;
      cursor: not-allowed;
      opacity: 0.4;
      white-space: nowrap;
      transition: opacity 160ms var(--ease-productive),
                  background 160ms var(--ease-productive);
      flex-shrink: 0;
    }

    .chip-fundamentada svg { width: 18px; height: 18px; flex-shrink: 0; }

    /* Send button — muted quando desabilitado, primary quando ativo */
    .btn-send {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 36px;
      height: 36px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--muted);
      background: var(--muted);
      color: var(--muted-foreground);
      cursor: not-allowed;
      transition: background 160ms var(--ease-productive),
                  border-color 160ms var(--ease-productive),
                  color 160ms var(--ease-productive),
                  transform 80ms var(--ease-productive);
      flex-shrink: 0;
    }

    .btn-send svg { width: 18px; height: 18px; }

    .btn-send.active {
      background: var(--primary);
      border-color: var(--primary);
      color: var(--primary-foreground);
      cursor: pointer;
    }

    .btn-send.active:hover { background: var(--primary-3); border-color: var(--primary-3); }
    .btn-send.active:active { transform: scale(0.92); }

    /* ── animacoes ──────────────────────────────────────── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── responsive ─────────────────────────────────────── */
    @media (max-width: 600px) {
      .topbar { padding: 0 20px; }
      .topbar-nav { display: none; }
    }
  </style>
</head>
<body>

<!-- ── TOPBAR ──────────────────────────────────────────── -->
<header class="topbar" role="banner">

  <!-- Logo Jus IA oficial -->
  <a href="index.html" class="topbar-logo" aria-label="Jus IA - Pagina inicial">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 30 32" fill="none" height="22" aria-hidden="true">
      <path fill-rule="evenodd" clip-rule="evenodd" fill="#FC0"     d="M26.098 0H12.663c-.508 0-.944.374-1.032.883l-.36 2.09s-.004.016-.004.023L8.768 17.52h5.734c.39 0 .746.216.93.565l6.428 12.342s.077.152.102.272c.016.079.023.134.028.178v.162a1 1 0 0 1-.014.1q.006-.02.01-.04l4.788-27.732.366-2.112A1.067 1.067 0 0 0 26.098 0"/>
      <path fill-rule="evenodd" clip-rule="evenodd" fill="#3D82DA"  d="M6.478 31.181v-.004q-.007-.044-.011-.093v-.016c0-.027-.005-.057-.005-.085v-.03q0-.036.003-.074.001-.026.006-.053.002-.027.007-.055.01-.055.02-.113L8.767 17.52H1.049c-.792.002-1.298.862-.924 1.573l6.428 12.342.01.016a1 1 0 0 1-.085-.27"/>
      <path fill-rule="evenodd" clip-rule="evenodd" fill="#77B340"  d="M21.99 31.038c-.041.584-.58.969-1.026.962H7.536c-.175 0-.356-.046-.356-.046-.557-.152-.82-.676-.681-1.296L8.766 17.52H14.5c.39 0 .747.216.931.565l6.428 12.342s.077.152.102.272.03.19.03.24z"/>
    </svg>
    Jus IA
  </a>

  <nav aria-label="Navegacao principal">
    <ul class="topbar-nav">
      <li><a href="#">Sobre</a></li>
      <li><a href="#">Planos e precos</a></li>
      <li><a href="#">Estude Jusbrasil</a></li>
    </ul>
  </nav>

  <div class="topbar-actions">
    <button class="btn-secondary">Cadastre-se</button>
    <button class="btn-primary">Entrar</button>
  </div>
</header>

<!-- ── HERO ──────────────────────────────────────────────── -->
<main class="hero">

  <h1 class="hero-headline">
    Toda IA responde. O Jus IA entende o Direito.
  </h1>

  <p class="hero-subtitle">
    Transforme sua pratica juridica com a inteligencia artificial do Jusbrasil.
  </p>

  <!-- Input Card -->
  <form class="input-card" id="searchForm" autocomplete="off" novalidate>

    <!-- Linha 1: area de texto com typewriter -->
    <div class="input-label-row">
      <span class="tw-placeholder" id="twPlaceholder" aria-hidden="true"></span>
      <input
        class="main-input"
        id="mainInput"
        type="text"
        aria-label="Faca uma pergunta ao Jus IA"
        spellcheck="false"
      />
    </div>

    <!-- Linha 2: botoes de acao -->
    <div class="input-actions-row">

      <!-- Esquerda: + e Pesquisa fundamentada -->
      <div class="input-left-actions">
        <button type="button" class="icon-btn" id="btnAttach" disabled aria-label="Adicionar arquivo">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M12 5v14M5 12h14"/>
          </svg>
        </button>

        <button type="button" class="chip-fundamentada" id="btnFundamentada" disabled aria-label="Pesquisa fundamentada">
          <!-- AiSkillLegalResearchIcon — lupa + sparkle -->
          <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="8.5" cy="8.5" r="5"/>
            <path d="m14 14 2.5 2.5"/>
            <path d="M8.5 6v5M6 8.5h5"/>
          </svg>
          Pesquisa fundamentada
        </button>
      </div>

      <!-- Direita: microfone e enviar -->
      <div class="input-right-actions">
        <button type="button" class="icon-btn" id="btnVoice" disabled aria-label="Entrada por voz">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M12 2a3 3 0 0 1 3 3v7a3 3 0 0 1-6 0V5a3 3 0 0 1 3-3z"/>
            <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
            <line x1="12" x2="12" y1="19" y2="22"/>
          </svg>
        </button>

        <button type="submit" class="btn-send" id="btnSend" disabled aria-label="Enviar mensagem">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M12 19V5M5 12l7-7 7 7"/>
          </svg>
        </button>
      </div>

    </div>
  </form>

</main>

<!-- ── SCRIPT ─────────────────────────────────────────────── -->
<script>
  (() => {
    const STORAGE_KEY = 'jusIA_landingInput';

    const input     = document.getElementById('mainInput');
    const twEl      = document.getElementById('twPlaceholder');
    const btnSend   = document.getElementById('btnSend');
    const form      = document.getElementById('searchForm');

    const suggestions = [
      'Peca ao Jus IA para analisar os autos do processo...',
      'Peca ao Jus IA para redigir uma peca...',
      'Peca ao Jus IA para mapear teses relevantes para o caso...',
      'Peca ao Jus IA para estudar a viabilidade do caso...',
      'Peca ao Jus IA para elaborar um parecer juridico...',
      'Peca ao Jus IA para criar a minuta do contrato...',
      'Peca ao Jus IA para buscar informacoes no documento...',
    ];

    // ── Typewriter ───────────────────────────────────────────
    let twTimer   = null;
    let twRunning = false;
    let shuffled  = [...suggestions].sort(() => Math.random() - 0.5);
    let si        = 0;

    function nextSuggestion() {
      const text = shuffled[si];
      si++;
      if (si >= shuffled.length) {
        shuffled = [...suggestions].sort(() => Math.random() - 0.5);
        si = 0;
      }
      return text;
    }

    function typeWriter(text, done) {
      let i = 0;
      twEl.textContent = '';

      (function type() {
        if (!twRunning) return;
        if (i < text.length) {
          twEl.textContent += text[i++];
          twTimer = setTimeout(type, 50 + Math.random() * 30);
        } else {
          twTimer = setTimeout(() => erase(done), 2500);
        }
      })();
    }

    function erase(done) {
      const txt = twEl.textContent;
      let i = txt.length;

      (function del() {
        if (!twRunning) return;
        if (i > 0) {
          twEl.textContent = txt.slice(0, --i);
          twTimer = setTimeout(del, 22 + Math.random() * 18);
        } else {
          twTimer = setTimeout(done, 380);
        }
      })();
    }

    function runLoop() {
      if (!twRunning) return;
      typeWriter(nextSuggestion(), runLoop);
    }

    function startTW() {
      if (twRunning) return;
      twRunning = true;
      twEl.style.display = '';
      runLoop();
    }

    function stopTW() {
      twRunning = false;
      clearTimeout(twTimer);
      twEl.textContent = '';
      twEl.style.display = 'none';
    }

    // ── Botoes ───────────────────────────────────────────────
    function syncButtons() {
      const has = input.value.trim().length > 0;
      btnSend.disabled = !has;
      btnSend.classList.toggle('active', has);
    }

    // ── Eventos ──────────────────────────────────────────────
    input.addEventListener('input', () => {
      localStorage.setItem(STORAGE_KEY, input.value);
      syncButtons();
      input.value.length > 0 ? stopTW() : startTW();
    });

    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        if (input.value.trim()) form.requestSubmit();
      }
    });

    form.addEventListener('submit', (e) => {
      e.preventDefault();
      const val = input.value.trim();
      if (!val) return;
      localStorage.setItem(STORAGE_KEY, val);
      // Reinicia o fluxo do zero a cada nova submissão
      localStorage.removeItem('jusIA_setupAnswers');
      localStorage.removeItem('jusIA_setupStep');
      localStorage.removeItem('jusIA_oab');
      window.location.href = 'setup.html';
    });

    // ── Init ─────────────────────────────────────────────────
    const saved = localStorage.getItem(STORAGE_KEY) || '';
    if (saved) {
      input.value = saved;
      stopTW();
    } else {
      startTW();
    }
    syncButtons();
  })();
</script>
</body>
</html>
